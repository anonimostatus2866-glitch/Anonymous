<!DOCTYPE html>
<html>
<head>
    <title>AI Signal System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <h1>AI Signal System</h1>

    <p class="subtitle">
        Login with your Elephantbet account to unlock premium signals
    </p>

    <div class="games">
        <img src="https://i.imgur.com/8Km9tLL.png" alt="aviator">
        <img src="https://i.imgur.com/Y3XQZ9X.png" alt="bacbo">
    </div>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Access Signals</button>
    </form>

    <p class="info">
        Bac Bo • Aviator • AI Prediction Engine
    </p>

    <p class="error">{{ message }}</p>

    <div class="terms">
        <small>
            By continuing, you agree to the bot's terms of service.
        
        </small>
    </div>

</div>

</body>
</html>
